<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div class="auth-container">
        <h1>ChomChon Smart Community Connect</h1>

        <div id="loginForm" class="form-section active">
            <h2 class="title">เข้าสู่ระบบ</h2>
            <label>
                <input type="text" id="logUser" placeholder="Username">
            </label>
            <label>
                <input type="password" id="logPass" placeholder="รหัสผ่าน">
            </label>
            <button onclick="login()">Login</button>
            <p onclick="toggleForm('signupForm')">สมัครสมาชิก</p>
            <p onclick="toggleForm('forgotForm')">ลืมรหัสผ่าน?</p>
        </div>

        <div id="signupForm" class="form-section">
            <h2 class="title">สมัครสมาชิก</h2>
            <div class="flex">
                <label>
                    <input type="text" id="regFirst" placeholder="ชื่อจริง">
                </label>
                <label>
                    <input type="text" id="regLast" placeholder="นามสกุล">
                </label>
            </div>
            <label>
                <input type="text" id="regUser" placeholder="Username">
            </label>
            <label>
                <input type="text" id="regPhone" placeholder="เบอร์โทรศัพท์ 10 หลัก" maxlength="10">
            </label>
            <label>
                <input type="password" id="regPass" placeholder="รหัสผ่าน">
            </label>
            <label>
                <input type="password" id="regPassCon" placeholder="ยืนยันรหัสผ่าน">
            </label>
            <div class="image-upload">
                <div class="image-preview">
                    <img id="previewImg" src="" alt="preview">
                    <span id="imgPlaceholder">เลือกรูปโปรไฟล์</span>
                </div>

                <input type="file" id="regImg" accept="image/*">
            </div>
            <button onclick="register()">Sign Up</button>
            <p onclick="toggleForm('loginForm')">กลับไปหน้าเข้าสู่ระบบ</p>
        </div>

        <div id="forgotForm" class="form-section">
            <h2 class="title">ลืมรหัสผ่าน</h2>

            <div id="fgStep1">
                <label>
                    <input type="text" id="fgFirst" placeholder="ชื่อจริง">
                </label>
                <label>
                    <input type="text" id="fgLast" placeholder="นามสกุล">
                </label>
                <button onclick="checkUserExists()" id="btnCheckUser">ตรวจสอบข้อมูล</button>
            </div>

            <div id="fgStep2" style="display: none;">
                <label>
                    <input type="password" id="fgNewPass" placeholder="รหัสผ่านใหม่">
                </label>
                <label>
                    <input type="password" id="fgNewPassCon" placeholder="ยืนยันรหัสผ่านใหม่">
                </label>
                <button onclick="resetPassword()" id="btnResetPass">บันทึกรหัสผ่านใหม่</button>
            </div>

            <p onclick="toggleForm('loginForm')">กลับไปหน้าเข้าสู่ระบบ</p>
        </div>
    </div>


    <script src="main.js"></script>
</body>

</html>
