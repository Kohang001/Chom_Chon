<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - ข่าวสารและประกาศเตือนภัย</title>
    <link rel="icon" type="image/png" href="data/logo/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/CSS/news.css">
    <link rel="stylesheet" href="/CSS/headfooter.css">
</head>

<body>
    <!-- Header -->
    <header class="navbar">
        <div class="container nav-inner">
            <div class="logo">ChomChon - NEWS</div>
            <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav id="navMenu" class="nav-menu">
                <div id="userProfile" style="display: flex; align-items: center; gap: 15px;">
                    <!-- Profile JS Inject -->
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="page-header">
            <div class="header-text">
                <span class="section-badge">Community Alerts</span>
                <h1 class="page-title">
                    <i class="fas fa-newspaper"></i>
                    News & Updates
                </h1>
                <p class="page-subtitle">ติดตามข่าวสารและประกาศเตือนภัยล่าสุดในชุมชน</p>
            </div>
            <button id="refreshBtn" class="btn-add" title="รีเฟรชข้อมูล">
                <i class="fas fa-sync-alt"></i>
                อัปเดตข้อมูล
            </button>
        </section>

        <!-- Filters -->
        <section class="news-filters">
            <button class="filter-btn active" data-filter="all">ทั้งหมด</button>
            <button class="filter-btn" data-filter="storm">พายุ</button>
            <button class="filter-btn" data-filter="rain">ฝนตกหนัก</button>
            <button class="filter-btn" data-filter="fire">ไฟป่า/PM2.5</button>
            <button class="filter-btn" data-filter="health">สาธารณสุข</button>
        </section>

        <!-- News Body -->
        <div id="loadingIndicator">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>กำลังโหลดข่าวสาร...</p>
        </div>

        <div id="newsGrid" class="news-grid">
            <!-- News cards will be injected here -->
        </div>

        <div id="emptyState" style="display: none;">
            <i class="fas fa-info-circle"></i>
            <h3>ไม่พบข้อมูลข่าวสารในขณะนี้</h3>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-menu">
            <a href="/HTML/news.html" class="active">NEWS</a>
            <a href="/HTML/lostfound.html">LOST&FOUND</a>
            <a href="/HTML/map.html">MAP</a>
        </div>
    </footer>

    <script src="/JS/menu.js"></script>
    <script src="/JS/nav.js"></script>
    <script src="/JS/news.js"></script>
</body>

</html>
