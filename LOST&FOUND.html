<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChumChon - LOST & FOUND</title>
    <link rel="stylesheet" href="LOST&FOUND.css">
</head>

<body>
    <header>
        <h1>ChumChon - LOST & FOUND</h1>
        <div class="hamburger" onclick="toggleSettings()">☰</div>
    </header>

    <div id="settingsPanel" class="settings-panel hidden">
        <h3>ตั้งค่าบัญชี</h3>
        <p id="profName"></p>
        <button onclick="logout()">ออกจากระบบ</button>
    </div>

    <main>
        <div class="filter-bar">
            <select id="lfFilter" onchange="resetAndLoadLF()">
                <option value="all">ทั้งหมด</option>
                <option value="lost">ของหาย</option>
                <option value="found">เจอของ</option>
            </select>
            <button onclick="openAddModal()">+ ประกาศ</button>
        </div>
        <div id="lfFeed"></div>
        <button id="loadMoreBtn" onclick="loadLF()">โหลดเพิ่ม</button>
    </main>

    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <h3>เพิ่มประกาศ</h3>
            <select id="lfType">
                <option value="lost">ของหาย</option>
                <option value="found">เจอของ</option>
            </select>
            <input type="text" id="lfItem" placeholder="ชื่อสิ่งของ">
            <input type="date" id="lfDate">
            <input type="text" id="lfPhone" placeholder="เบอร์ติดต่อ" maxlength="10">
            <textarea id="lfDesc" placeholder="รายละเอียด"></textarea>
            <input type="file" id="lfImg" accept="image/*">
            <button onclick="submitLF()">โพสต์</button>
            <button onclick="closeModals()">ยกเลิก</button>
        </div>
    </div>

    <footer>
        <button onclick="location.href='News.html'">NEWS</button>
        <button class="active" onclick="location.href='LOST&FOUND.html'">LOST & FOUND</button>
        <button onclick="location.href='MAP.html'">MAP</button>
    </footer>
    <script src="LOST&FOUND.js"></script>
</body>

</html>
